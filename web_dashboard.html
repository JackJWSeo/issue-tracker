<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trump Monitor Dashboard</title>
  <style>
    :root {
      --bg: #eef3f8;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-strong: #ffffff;
      --text: #16202a;
      --muted: #5e6b78;
      --muted-strong: #3f4f61;
      --accent: #0b6bcb;
      --accent-soft: #d9ebff;
      --accent-deep: #084f98;
      --ring: rgba(11, 107, 203, 0.18);
      --danger: #d33f49;
      --danger-soft: #ffe3df;
      --warning: #d97706;
      --warning-soft: #fff0db;
      --success: #3f4f61;
      --success-soft: #eef2f7;
      --shadow: 0 18px 60px rgba(18, 39, 61, 0.12);
      --border: rgba(18, 39, 61, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(11, 107, 203, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(211, 63, 73, 0.10), transparent 22%),
        linear-gradient(180deg, #f7fafe 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .page {
      width: min(1400px, calc(100% - 32px));
      margin: 24px auto 36px;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 24px;
      display: grid;
      gap: 16px;
      margin-top: 10px;
    }

    .sidebar-toggle {
      display: none;
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
    }

    .sidebar-toggle span:last-child {
      float: right;
      color: var(--muted);
      font-weight: 600;
    }

    .content {
      min-width: 0;
    }

    .control-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .control-card {
      background: var(--panel-strong);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 8px 24px rgba(18, 39, 61, 0.06);
    }

    .control-card strong {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .control-card label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .control-card input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .control-card input[type="number"] {
      width: 100%;
      margin-top: 8px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .control-card select {
      width: 100%;
      margin-top: 8px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .filter-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .stats {
      margin: 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .stat {
      background: rgba(255,255,255,0.86);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: 0 10px 28px rgba(18, 39, 61, 0.06);
    }

    .stat .label {
      font-size: 13px;
      color: var(--muted);
    }

    .stat .value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin: 28px 0 16px;
    }

    .content > .section-title:first-child {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .section-title p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .issues {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .issue-card {
      --card-accent-top: #9bc9f8;
      --card-accent-bottom: #b9dcff;
      --pill-bg-top: #e1efff;
      --pill-bg-bottom: #d5e8ff;
      --pill-text: #084f98;
      --pill-border: rgba(11, 107, 203, 0.08);
      --pill-hover-top: #d1e7ff;
      --pill-hover-bottom: #c2deff;
      --pill-hover-text: #063d75;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 24px 24px 22px 62px;
      box-shadow:
        0 18px 40px rgba(18, 39, 61, 0.14),
        0 6px 18px rgba(18, 39, 61, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      min-height: 236px;
    }

    .issue-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(11, 107, 203, 0.08), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.28), transparent 38%);
      pointer-events: none;
    }

    .issue-card::before {
      content: "";
      position: absolute;
      top: -1px;
      bottom: -1px;
      left: -1px;
      width: 24px;
      border-radius: 26px 0 0 26px;
      background: linear-gradient(180deg, var(--card-accent-top), var(--card-accent-bottom));
    }

    .issue-card.source-trusted-news {
      --card-accent-top: #d97706;
      --card-accent-bottom: #f6ad55;
      --pill-bg-top: #fff1dd;
      --pill-bg-bottom: #ffe2bc;
      --pill-text: #9a4a00;
      --pill-border: rgba(217, 119, 6, 0.20);
      --pill-hover-top: #ffe8cc;
      --pill-hover-bottom: #ffd7a3;
      --pill-hover-text: #7c3a00;
    }

    .issue-card.source-google-news {
      --card-accent-top: #64748b;
      --card-accent-bottom: #cbd5e1;
      --pill-bg-top: #f1f5f9;
      --pill-bg-bottom: #e2e8f0;
      --pill-text: #475569;
      --pill-border: rgba(100, 116, 139, 0.16);
      --pill-hover-top: #e8eef5;
      --pill-hover-bottom: #dbe4ee;
      --pill-hover-text: #334155;
    }

    .issue-card.source-truthsocial {
      --card-accent-top: #7c3aed;
      --card-accent-bottom: #c4b5fd;
      --pill-bg-top: #eee7ff;
      --pill-bg-bottom: #ddd0ff;
      --pill-text: #5b21b6;
      --pill-border: rgba(124, 58, 237, 0.12);
      --pill-hover-top: #e6dcff;
      --pill-hover-bottom: #d4c0ff;
      --pill-hover-text: #4c1d95;
    }

    .issue-card.source-x {
      --card-accent-top: #111827;
      --card-accent-bottom: #9ca3af;
      --pill-bg-top: #eef2f7;
      --pill-bg-bottom: #dce4ef;
      --pill-text: #111827;
      --pill-border: rgba(17, 24, 39, 0.10);
      --pill-hover-top: #e4eaf2;
      --pill-hover-bottom: #cfd9e7;
      --pill-hover-text: #030712;
    }

    .issue-card.source-youtube {
      --card-accent-top: #dc2626;
      --card-accent-bottom: #fca5a5;
      --pill-bg-top: #ffe3e3;
      --pill-bg-bottom: #ffd0d0;
      --pill-text: #b91c1c;
      --pill-border: rgba(220, 38, 38, 0.12);
      --pill-hover-top: #ffd7d7;
      --pill-hover-bottom: #ffc1c1;
      --pill-hover-text: #991b1b;
    }

    .issue-card.is-new {
      border-color: rgba(211, 63, 73, 0.35);
      box-shadow:
        0 22px 46px rgba(211, 63, 73, 0.16),
        0 8px 20px rgba(211, 63, 73, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }

    .issue-card.priority-urgent {
      border-color: rgba(211, 63, 73, 0.42);
      box-shadow:
        0 24px 56px rgba(211, 63, 73, 0.18),
        0 10px 22px rgba(18, 39, 61, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .issue-card.priority-important {
      border-color: rgba(217, 119, 6, 0.26);
    }

    .issue-card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 24px 54px rgba(18, 39, 61, 0.18),
        0 10px 22px rgba(18, 39, 61, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .issue-meta {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      position: relative;
      z-index: 1;
    }

    .issue-meta-left {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .issue-saved-at {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      text-align: right;
      white-space: nowrap;
      margin-top: -4px;
    }

    .priority-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: -0.01em;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .priority-badge.priority-urgent {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: rgba(211, 63, 73, 0.18);
    }

    .priority-badge.priority-important {
      background: var(--warning-soft);
      color: var(--warning);
      border-color: rgba(217, 119, 6, 0.18);
    }

    .priority-badge.priority-normal {
      background: var(--success-soft);
      color: var(--muted-strong);
      border-color: rgba(63, 79, 97, 0.10);
    }

    .source-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--pill-bg-top), var(--pill-bg-bottom));
      color: var(--pill-text);
      font-weight: 700;
      letter-spacing: -0.01em;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-decoration: none;
      border: 1px solid var(--pill-border);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, color 0.18s ease;
      margin-left: -12px;
      margin-top: -4px;
    }

    .source-pill:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(18, 39, 61, 0.08);
      background: linear-gradient(180deg, var(--pill-hover-top), var(--pill-hover-bottom));
      color: var(--pill-hover-text);
    }

    .issue-title {
      margin: 0;
      position: relative;
      z-index: 1;
      font-size: 24px;
      line-height: 1.42;
      letter-spacing: -0.035em;
      word-break: keep-all;
      text-wrap: balance;
    }

    .issue-desc {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
      word-break: keep-all;
      position: relative;
      z-index: 1;
    }

    .issue-detail {
      display: grid;
      gap: 10px;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid rgba(18, 39, 61, 0.08);
      position: relative;
      z-index: 1;
    }

    .issue-detail-row {
      display: grid;
      gap: 4px;
    }

    .issue-detail-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .issue-detail-value {
      color: var(--muted-strong);
      font-size: 14px;
      line-height: 1.6;
      word-break: keep-all;
    }

    .empty {
      padding: 34px 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.8);
      border: 1px dashed rgba(18, 39, 61, 0.14);
      border-radius: 20px;
    }

    .load-more-status {
      padding: 18px 12px 4px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .load-more-trigger {
      height: 8px;
    }

    @media (max-width: 1180px) {
      .page {
        grid-template-columns: 300px minmax(0, 1fr);
      }

      .issues {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        margin-top: 0;
      }

      .sidebar-toggle {
        display: block;
      }

      .sidebar.is-collapsed .stats,
      .sidebar.is-collapsed .control-panel {
        display: none;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .control-grid {
        grid-template-columns: 1fr;
      }

      .issues {
        grid-template-columns: 1fr;
      }

      .issue-card {
        min-height: auto;
        padding: 22px 20px 20px 50px;
      }

      .issue-title {
        font-size: 21px;
      }
    }
  </style>
</head>
  <body>
  <main class="page">
    <aside class="sidebar is-collapsed" id="sidebar">
      <button class="sidebar-toggle" id="sidebarToggle" type="button">
        <span>옵션 보기</span>
        <span id="sidebarToggleLabel">펼치기</span>
      </button>
      <section class="stats">
        <div class="stat">
          <div class="label" id="issueCountLabel">표시 중 이슈 수</div>
          <div class="value" id="issueCount">0</div>
        </div>
        <div class="stat">
          <div class="label">긴급 카드 수</div>
          <div class="value" id="urgentIssueCount">0</div>
        </div>
      </section>
      <section class="control-panel">
        <strong>알림 설정</strong>
        <div class="control-grid">
          <div class="control-card">
            <strong>알림음</strong>
            <label><input type="checkbox" id="soundToggle" checked> 새 이슈가 오면 소리 재생</label>
          </div>
          <div class="control-card">
            <strong>자동 새로고침 주기</strong>
            <div style="color: var(--muted); font-size: 14px;">초 단위로 입력하면 해당 주기로 자동 갱신합니다.</div>
            <input type="number" id="refreshSecondsInput" min="3" step="1" value="10">
          </div>
          <div class="control-card">
            <strong>기본 표시 개수</strong>
            <div style="color: var(--muted); font-size: 14px;">10개부터 100개까지 선택하고, 아래로 내리면 10개씩 더 표시합니다.</div>
            <select id="displayCountSelect">
              <option value="10" selected>10개</option>
              <option value="20">20개</option>
              <option value="30">30개</option>
              <option value="40">40개</option>
              <option value="50">50개</option>
              <option value="60">60개</option>
              <option value="70">70개</option>
              <option value="80">80개</option>
              <option value="90">90개</option>
              <option value="100">100개</option>
            </select>
          </div>
          <div class="control-card">
            <strong>콘텐츠 종류 필터</strong>
            <div class="filter-list">
              <label><input type="checkbox" id="filterTrustedNews" checked> 주요 언론 기사</label>
              <label><input type="checkbox" id="filterGoogleNews" checked> 기타 기사(구글 뉴스)</label>
              <label><input type="checkbox" id="filterTruthSocial" checked> 트루스소셜</label>
              <label><input type="checkbox" id="filterX" checked> X</label>
              <label><input type="checkbox" id="filterYoutube" checked> 유튜브</label>
            </div>
          </div>
        </div>
      </section>
    </aside>

    <section class="content">
      <section id="issues" class="issues"></section>
      <div id="loadMoreStatus" class="load-more-status"></div>
      <div id="loadMoreTrigger" class="load-more-trigger" aria-hidden="true"></div>
    </section>
  </main>

  <script>
    const DEFAULT_WINDOW_MINUTES = 60;
    const MAX_FETCH_LIMIT = 100;
    const LOAD_MORE_STEP = 10;

    const issuesEl = document.getElementById("issues");
    const issueCountEl = document.getElementById("issueCount");
    const issueCountLabelEl = document.getElementById("issueCountLabel");
    const urgentIssueCountEl = document.getElementById("urgentIssueCount");
    const soundToggleEl = document.getElementById("soundToggle");
    const refreshSecondsInputEl = document.getElementById("refreshSecondsInput");
    const filterTrustedNewsEl = document.getElementById("filterTrustedNews");
    const filterGoogleNewsEl = document.getElementById("filterGoogleNews");
    const filterTruthSocialEl = document.getElementById("filterTruthSocial");
    const filterXEl = document.getElementById("filterX");
    const filterYoutubeEl = document.getElementById("filterYoutube");
    const displayCountSelectEl = document.getElementById("displayCountSelect");
    const sidebarEl = document.getElementById("sidebar");
    const sidebarToggleEl = document.getElementById("sidebarToggle");
    const sidebarToggleLabelEl = document.getElementById("sidebarToggleLabel");
    const loadMoreStatusEl = document.getElementById("loadMoreStatus");
    const loadMoreTriggerEl = document.getElementById("loadMoreTrigger");

    let previousIds = new Set();
    let hasLoadedOnce = false;
    let refreshTimer = null;
    let lastRenderedSignature = "";
    let latestIssues = { issues: [], selection_mode: "recent_window", window_minutes: 60, fallback_min_count: 10 };
    let visibleIssueCount = 10;
    let loadMoreObserver = null;

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat("ko-KR", {
        dateStyle: "short",
        timeStyle: "medium",
      }).format(date);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function playAlertSound() {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        const context = new AudioContextClass();
        const oscillator = context.createOscillator();
        const gain = context.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(880, context.currentTime);
        gain.gain.setValueAtTime(0.0001, context.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.14, context.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.45);

        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start();
        oscillator.stop(context.currentTime + 0.45);
        oscillator.onended = () => context.close();
      } catch (error) {
        console.warn("sound error", error);
      }
    }

    function getDisplayTitle(issue) {
      return issue.translated_title || issue.title || "(제목 없음)";
    }

    function getDisplayBody(issue) {
      return issue.translated_body || issue.body || "";
    }

    function hasReadableBody(issue) {
      const body = normalizeTtsText(getDisplayBody(issue));
      return body && body !== "본문 정보가 없습니다";
    }

    function normalizeTtsText(value) {
      return String(value || "")
        .replaceAll(/https?:\/\/\S+/g, " ")
        .replaceAll(/[“”"'`]/g, "")
        .replaceAll(/\[[^\]]+\]/g, " ")
        .replaceAll(/\s+/g, " ")
        .trim();
    }

    function buildSourceLabel(source) {
      if (!source) return "알 수 없는 출처";
      if (source.startsWith("trusted_news:")) {
        return "주요 언론";
      }
      if (source.startsWith("google_news:")) {
        return "구글 뉴스";
      }
      if (source.startsWith("x:")) {
        return "X";
      }
      if (source.startsWith("youtube_live:")) {
        return "유튜브 라이브";
      }
      if (source.startsWith("truthsocial:")) {
        return "트루스소셜";
      }
      return source;
    }

    function getSourceType(source) {
      if (!source) return "unknown";
      if (source.startsWith("trusted_news:")) return "trusted_news";
      if (source.startsWith("google_news:")) return "google_news";
      if (source.startsWith("truthsocial:")) return "truthsocial";
      if (source.startsWith("x:")) return "x";
      if (source.startsWith("youtube_live:")) return "youtube";
      return "unknown";
    }

    function getSourceCardClass(source) {
      const sourceType = getSourceType(source);
      if (sourceType === "trusted_news") return "source-trusted-news";
      if (sourceType === "google_news") return "source-google-news";
      if (sourceType === "truthsocial") return "source-truthsocial";
      if (sourceType === "x") return "source-x";
      if (sourceType === "youtube") return "source-youtube";
      return "source-unknown";
    }

    function isVisibleByFilter(issue) {
      const sourceType = getSourceType(issue.source);
      if (sourceType === "trusted_news") return filterTrustedNewsEl.checked;
      if (sourceType === "google_news") return filterGoogleNewsEl.checked;
      if (sourceType === "truthsocial") return filterTruthSocialEl.checked;
      if (sourceType === "x") return filterXEl.checked;
      if (sourceType === "youtube") return filterYoutubeEl.checked;
      return true;
    }

    function getBaseDisplayCount() {
      const value = Number.parseInt(displayCountSelectEl.value || "10", 10);
      return Math.min(MAX_FETCH_LIMIT, Math.max(10, Number.isNaN(value) ? 10 : value));
    }

    function getApiUrl() {
      const params = new URLSearchParams({
        minutes: String(DEFAULT_WINDOW_MINUTES),
        limit: String(MAX_FETCH_LIMIT),
        fallback_min_count: String(getBaseDisplayCount()),
      });
      return `/api/issues?${params.toString()}`;
    }

    function ensureVisibleIssueCount() {
      visibleIssueCount = Math.max(visibleIssueCount, getBaseDisplayCount());
    }

    function loadMoreIssues() {
      const totalVisible = (latestIssues.issues || []).filter(isVisibleByFilter).length;
      if (visibleIssueCount >= totalVisible) {
        return;
      }
      visibleIssueCount = Math.min(totalVisible, visibleIssueCount + LOAD_MORE_STEP);
      renderIssues(latestIssues, new Set());
    }

    function updateIssueSummary(data, displayedCount, totalCount) {
      const isFallback = data.selection_mode === "latest_fallback";
      const urgentCount = (data.issues || []).filter((issue) => issue.priority_level === "urgent" && isVisibleByFilter(issue)).length;
      issueCountLabelEl.textContent = isFallback ? "최신 기준 표시 수" : "최근 1시간 표시 수";
      urgentIssueCountEl.textContent = String(urgentCount);
      issueCountEl.textContent = `${displayedCount}/${totalCount}`;
    }

    function renderIssues(data, newIds) {
      const issues = data.issues || [];
      const visibleIssues = issues.filter(isVisibleByFilter);
      ensureVisibleIssueCount();
      const displayedIssues = visibleIssues.slice(0, visibleIssueCount);

      updateIssueSummary(data, displayedIssues.length, visibleIssues.length);

      if (!visibleIssues.length) {
        issuesEl.innerHTML = '<div class="empty">선택한 조건에 맞는 이슈가 없습니다.</div>';
        loadMoreStatusEl.textContent = "";
        return;
      }

      issuesEl.innerHTML = displayedIssues.map((issue) => {
        const isNew = newIds.has(issue.item_id);
        const sourceCardClass = getSourceCardClass(issue.source);
        const safeTitle = escapeHtml(issue.title);
        const safeDisplayTitle = escapeHtml(getDisplayTitle(issue));
        const safeSource = escapeHtml(buildSourceLabel(issue.source));
        const safeUrl = escapeHtml(issue.url);
        const issueTimestamp = issue.published_at || issue.created_at;
        const issueTimestampLabel = issue.published_at ? "발행" : "수집";
        const safeIssueTimestamp = escapeHtml(formatDate(issueTimestamp));
        const safeIssueTimestampLabel = escapeHtml(issueTimestampLabel);
        const safeItemId = escapeHtml(issue.item_id);
        const safePriorityLabel = escapeHtml(issue.priority_label || "일반");
        const priorityClass = escapeHtml(`priority-${issue.priority_level || "normal"}`);
        return `
          <article class="issue-card ${sourceCardClass} ${priorityClass} ${isNew ? "is-new" : ""}" data-item-id="${safeItemId}">
            <div class="issue-meta">
              <div class="issue-meta-left">
                <a class="source-pill" href="${safeUrl}" target="_blank" rel="noreferrer">출처 · ${safeSource}</a>
                <span class="priority-badge ${priorityClass}">${safePriorityLabel}</span>
              </div>
              <div class="issue-saved-at">${safeIssueTimestampLabel} ${safeIssueTimestamp}</div>
            </div>
            <h3 class="issue-title">${safeDisplayTitle}</h3>
            <div class="issue-detail">
              <div class="issue-detail-row">
                <div class="issue-detail-label">Original Title</div>
                <p class="issue-detail-value">${safeTitle}</p>
              </div>
            </div>
          </article>
        `;
      }).join("");

      if (displayedIssues.length < visibleIssues.length) {
        const remaining = visibleIssues.length - displayedIssues.length;
        loadMoreStatusEl.textContent = `아래로 내리면 ${Math.min(LOAD_MORE_STEP, remaining)}개를 더 불러옵니다. 현재 ${displayedIssues.length} / ${visibleIssues.length}`;
      } else {
        loadMoreStatusEl.textContent = `모든 이슈를 표시 중입니다. 총 ${visibleIssues.length}개`;
      }
    }

    async function refreshIssues() {
      try {
        const response = await fetch(getApiUrl(), { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        latestIssues = data;
        ensureVisibleIssueCount();
        const ids = new Set(data.issues.map((issue) => issue.item_id));
        const newIds = new Set();
        const renderSignature = JSON.stringify({
          fallback_min_count: data.fallback_min_count,
          issues: data.issues.map((issue) => [issue.item_id, issue.created_at]),
        });

        if (hasLoadedOnce) {
          for (const id of ids) {
            if (!previousIds.has(id)) {
              newIds.add(id);
            }
          }
        }

        previousIds = ids;
        const hasDataChanged = !hasLoadedOnce || renderSignature !== lastRenderedSignature;
        hasLoadedOnce = true;

        if (!hasDataChanged) {
          return;
        }

        renderIssues(data, newIds);
        lastRenderedSignature = renderSignature;
        if (newIds.size > 0) {
          if (soundToggleEl.checked) {
            playAlertSound();
          }
        }
      } catch (error) {
        console.error(error);
      }
    }

    function getRefreshIntervalMs() {
      const seconds = Number.parseInt(refreshSecondsInputEl.value, 10);
      if (Number.isNaN(seconds)) {
        return 10000;
      }
      return Math.max(3, seconds) * 1000;
    }

    function syncSidebarForViewport() {
      const isMobile = window.matchMedia("(max-width: 900px)").matches;
      if (!isMobile) {
        sidebarEl.classList.remove("is-collapsed");
        sidebarToggleLabelEl.textContent = "항상 표시";
        return;
      }
      sidebarToggleLabelEl.textContent = sidebarEl.classList.contains("is-collapsed") ? "펼치기" : "접기";
    }

    function restartAutoRefresh() {
      if (refreshTimer) {
        clearInterval(refreshTimer);
      }
      refreshTimer = setInterval(() => {
        refreshIssues();
      }, getRefreshIntervalMs());
    }

    refreshSecondsInputEl.addEventListener("change", () => {
      const seconds = Math.max(3, Number.parseInt(refreshSecondsInputEl.value || "10", 10) || 10);
      refreshSecondsInputEl.value = String(seconds);
      restartAutoRefresh();
    });

    [filterTrustedNewsEl, filterGoogleNewsEl, filterTruthSocialEl, filterXEl, filterYoutubeEl].forEach((element) => {
      element.addEventListener("change", () => {
        renderIssues(latestIssues, new Set());
      });
    });

    displayCountSelectEl.addEventListener("change", () => {
      visibleIssueCount = getBaseDisplayCount();
      hasLoadedOnce = false;
      lastRenderedSignature = "";
      refreshIssues();
    });

    sidebarToggleEl.addEventListener("click", () => {
      if (!window.matchMedia("(max-width: 900px)").matches) {
        return;
      }
      sidebarEl.classList.toggle("is-collapsed");
      syncSidebarForViewport();
    });

    window.addEventListener("resize", syncSidebarForViewport);
    loadMoreObserver = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (entry.isIntersecting) {
          loadMoreIssues();
        }
      }
    }, { rootMargin: "0px 0px 240px 0px" });
    loadMoreObserver.observe(loadMoreTriggerEl);
    refreshIssues();
    restartAutoRefresh();
    syncSidebarForViewport();
  </script>
</body>
</html>
