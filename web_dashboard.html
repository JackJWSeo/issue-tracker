<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trump Monitor Dashboard</title>
  <style>
    :root {
      --bg: #eef3f8;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-strong: #ffffff;
      --text: #16202a;
      --muted: #5e6b78;
      --muted-strong: #3f4f61;
      --accent: #0b6bcb;
      --accent-soft: #d9ebff;
      --accent-deep: #084f98;
      --ring: rgba(11, 107, 203, 0.18);
      --danger: #d33f49;
      --shadow: 0 18px 60px rgba(18, 39, 61, 0.12);
      --border: rgba(18, 39, 61, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(11, 107, 203, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(211, 63, 73, 0.10), transparent 22%),
        linear-gradient(180deg, #f7fafe 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .page {
      width: min(1400px, calc(100% - 32px));
      margin: 24px auto 36px;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 24px;
      display: grid;
      gap: 16px;
      margin-top: 78px;
    }

    .sidebar-toggle {
      display: none;
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
    }

    .sidebar-toggle span:last-child {
      float: right;
      color: var(--muted);
      font-weight: 600;
    }

    .content {
      min-width: 0;
    }

    .control-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .control-card {
      background: var(--panel-strong);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 8px 24px rgba(18, 39, 61, 0.06);
    }

    .control-card strong {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .control-card label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .control-card input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .control-card input[type="number"] {
      width: 100%;
      margin-top: 8px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .filter-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .stats {
      margin: 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .stat {
      background: rgba(255,255,255,0.86);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: 0 10px 28px rgba(18, 39, 61, 0.06);
    }

    .stat .label {
      font-size: 13px;
      color: var(--muted);
    }

    .stat .value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin: 28px 0 16px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .section-title p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .issues {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .issue-card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 24px 24px 22px 62px;
      box-shadow:
        0 18px 40px rgba(18, 39, 61, 0.14),
        0 6px 18px rgba(18, 39, 61, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      min-height: 236px;
    }

    .issue-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(11, 107, 203, 0.08), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.28), transparent 38%);
      pointer-events: none;
    }

    .issue-card::before {
      content: "";
      position: absolute;
      top: -1px;
      bottom: -1px;
      left: -1px;
      width: 24px;
      border-radius: 26px 0 0 26px;
      background: linear-gradient(180deg, #9bc9f8, #b9dcff);
    }

    .issue-card.is-new {
      border-color: rgba(211, 63, 73, 0.35);
      box-shadow:
        0 22px 46px rgba(211, 63, 73, 0.16),
        0 8px 20px rgba(211, 63, 73, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }

    .issue-card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 24px 54px rgba(18, 39, 61, 0.18),
        0 10px 22px rgba(18, 39, 61, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .issue-meta {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      position: relative;
      z-index: 1;
    }

    .issue-saved-at {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      text-align: right;
      white-space: nowrap;
      margin-top: -4px;
    }

    .source-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, #e1efff, #d5e8ff);
      color: var(--accent-deep);
      font-weight: 700;
      letter-spacing: -0.01em;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-decoration: none;
      border: 1px solid rgba(11, 107, 203, 0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, color 0.18s ease;
      margin-left: -12px;
      margin-top: -4px;
    }

    .source-pill:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(18, 39, 61, 0.08);
      background: linear-gradient(180deg, #d1e7ff, #c2deff);
      color: #063d75;
    }

    .issue-title {
      margin: 0;
      position: relative;
      z-index: 1;
      font-size: 24px;
      line-height: 1.42;
      letter-spacing: -0.035em;
      word-break: keep-all;
      text-wrap: balance;
    }

    .issue-desc {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
      word-break: keep-all;
      position: relative;
      z-index: 1;
    }

    .issue-detail {
      display: grid;
      gap: 10px;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid rgba(18, 39, 61, 0.08);
      position: relative;
      z-index: 1;
    }

    .issue-detail-row {
      display: grid;
      gap: 4px;
    }

    .issue-detail-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .issue-detail-value {
      color: var(--muted-strong);
      font-size: 14px;
      line-height: 1.6;
      word-break: keep-all;
    }

    .empty {
      padding: 34px 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.8);
      border: 1px dashed rgba(18, 39, 61, 0.14);
      border-radius: 20px;
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        margin-top: 0;
      }

      .sidebar-toggle {
        display: block;
      }

      .sidebar.is-collapsed .stats,
      .sidebar.is-collapsed .control-panel {
        display: none;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .control-grid {
        grid-template-columns: 1fr;
      }

      .issues {
        grid-template-columns: 1fr;
      }

      .issue-card {
        min-height: auto;
        padding: 22px 20px 20px 50px;
      }

      .issue-title {
        font-size: 21px;
      }
    }
  </style>
</head>
  <body>
  <main class="page">
    <aside class="sidebar is-collapsed" id="sidebar">
      <button class="sidebar-toggle" id="sidebarToggle" type="button">
        <span>옵션 보기</span>
        <span id="sidebarToggleLabel">펼치기</span>
      </button>
      <section class="stats">
        <div class="stat">
          <div class="label">최근 1시간 이슈 수</div>
          <div class="value" id="issueCount">0</div>
        </div>
      </section>
      <section class="control-panel">
        <strong>알림 설정</strong>
        <div class="control-grid">
          <div class="control-card">
            <strong>알림음</strong>
            <label><input type="checkbox" id="soundToggle" checked> 새 이슈가 오면 소리 재생</label>
          </div>
          <div class="control-card">
            <strong>자동 새로고침 주기</strong>
            <div style="color: var(--muted); font-size: 14px;">초 단위로 입력하면 해당 주기로 자동 갱신합니다.</div>
            <input type="number" id="refreshSecondsInput" min="3" step="1" value="10">
          </div>
          <div class="control-card">
            <strong>콘텐츠 종류 필터</strong>
            <div class="filter-list">
              <label><input type="checkbox" id="filterGoogleNews" checked> 구글 뉴스</label>
              <label><input type="checkbox" id="filterTruthSocial" checked> 트루스소셜</label>
              <label><input type="checkbox" id="filterX" checked> X</label>
              <label><input type="checkbox" id="filterYoutube" checked> 유튜브</label>
            </div>
          </div>
        </div>
      </section>
    </aside>

    <section class="content">
      <div class="section-title">
        <h2>실시간 이슈 카드</h2>
        <p>최근 1시간 기준, 한 번에 최대 100건 표시</p>
      </div>

      <section id="issues" class="issues"></section>
    </section>
  </main>

  <script>
    const API_URL = "/api/issues?minutes=60&limit=100";

    const issuesEl = document.getElementById("issues");
    const issueCountEl = document.getElementById("issueCount");
    const soundToggleEl = document.getElementById("soundToggle");
    const refreshSecondsInputEl = document.getElementById("refreshSecondsInput");
    const filterGoogleNewsEl = document.getElementById("filterGoogleNews");
    const filterTruthSocialEl = document.getElementById("filterTruthSocial");
    const filterXEl = document.getElementById("filterX");
    const filterYoutubeEl = document.getElementById("filterYoutube");
    const sidebarEl = document.getElementById("sidebar");
    const sidebarToggleEl = document.getElementById("sidebarToggle");
    const sidebarToggleLabelEl = document.getElementById("sidebarToggleLabel");

    let previousIds = new Set();
    let hasLoadedOnce = false;
    let refreshTimer = null;
    let lastRenderedSignature = "";
    let latestIssues = [];

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat("ko-KR", {
        dateStyle: "short",
        timeStyle: "medium",
      }).format(date);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function playAlertSound() {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        const context = new AudioContextClass();
        const oscillator = context.createOscillator();
        const gain = context.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(880, context.currentTime);
        gain.gain.setValueAtTime(0.0001, context.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.14, context.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.45);

        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start();
        oscillator.stop(context.currentTime + 0.45);
        oscillator.onended = () => context.close();
      } catch (error) {
        console.warn("sound error", error);
      }
    }

    function getDisplayTitle(issue) {
      return issue.translated_title || issue.title || "(제목 없음)";
    }

    function getDisplayBody(issue) {
      return issue.translated_body || issue.body || "";
    }

    function hasReadableBody(issue) {
      const body = normalizeTtsText(getDisplayBody(issue));
      return body && body !== "본문 정보가 없습니다";
    }

    function normalizeTtsText(value) {
      return String(value || "")
        .replaceAll(/https?:\/\/\S+/g, " ")
        .replaceAll(/[“”"'`]/g, "")
        .replaceAll(/\[[^\]]+\]/g, " ")
        .replaceAll(/\s+/g, " ")
        .trim();
    }

    function buildSourceLabel(source) {
      if (!source) return "알 수 없는 출처";
      if (source.startsWith("google_news:")) {
        return `구글 뉴스 · ${source.slice("google_news:".length)}`;
      }
      if (source.startsWith("x:")) {
        return `X · ${source.slice("x:".length)}`;
      }
      if (source.startsWith("youtube_live:")) {
        return `유튜브 라이브 · ${source.slice("youtube_live:".length)}`;
      }
      if (source.startsWith("truthsocial:")) {
        return `트루스소셜 · ${source.slice("truthsocial:".length)}`;
      }
      return source;
    }

    function getSourceType(source) {
      if (!source) return "unknown";
      if (source.startsWith("google_news:")) return "google_news";
      if (source.startsWith("truthsocial:")) return "truthsocial";
      if (source.startsWith("x:")) return "x";
      if (source.startsWith("youtube_live:")) return "youtube";
      return "unknown";
    }

    function isVisibleByFilter(issue) {
      const sourceType = getSourceType(issue.source);
      if (sourceType === "google_news") return filterGoogleNewsEl.checked;
      if (sourceType === "truthsocial") return filterTruthSocialEl.checked;
      if (sourceType === "x") return filterXEl.checked;
      if (sourceType === "youtube") return filterYoutubeEl.checked;
      return true;
    }

    function renderIssues(issues, newIds) {
      const visibleIssues = issues.filter(isVisibleByFilter);

      issueCountEl.textContent = String(visibleIssues.length);

      if (!visibleIssues.length) {
        issuesEl.innerHTML = '<div class="empty">선택한 조건에 맞는 최근 1시간 이슈가 없습니다.</div>';
        return;
      }

      issuesEl.innerHTML = visibleIssues.map((issue) => {
        const isNew = newIds.has(issue.item_id);
        const safeTitle = escapeHtml(issue.title);
        const safeDisplayTitle = escapeHtml(getDisplayTitle(issue));
        const safeSource = escapeHtml(buildSourceLabel(issue.source));
        const safeUrl = escapeHtml(issue.url);
        const safeCreatedAt = escapeHtml(formatDate(issue.created_at));
        const safeItemId = escapeHtml(issue.item_id);
        return `
          <article class="issue-card ${isNew ? "is-new" : ""}" data-item-id="${safeItemId}">
            <div class="issue-meta">
              <a class="source-pill" href="${safeUrl}" target="_blank" rel="noreferrer">출처 · ${safeSource}</a>
              <div class="issue-saved-at">${safeCreatedAt}</div>
            </div>
            <h3 class="issue-title">${safeDisplayTitle}</h3>
            <div class="issue-detail">
              <div class="issue-detail-row">
                <div class="issue-detail-label">Original Title</div>
                <p class="issue-detail-value">${safeTitle}</p>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function refreshIssues() {
      try {
        const response = await fetch(API_URL, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        latestIssues = data.issues;
        const ids = new Set(data.issues.map((issue) => issue.item_id));
        const newIds = new Set();
        const renderSignature = JSON.stringify(data.issues.map((issue) => [issue.item_id, issue.created_at]));

        if (hasLoadedOnce) {
          for (const id of ids) {
            if (!previousIds.has(id)) {
              newIds.add(id);
            }
          }
        }

        previousIds = ids;
        const hasDataChanged = !hasLoadedOnce || renderSignature !== lastRenderedSignature;
        hasLoadedOnce = true;

        if (!hasDataChanged) {
          return;
        }

        renderIssues(data.issues, newIds);
        lastRenderedSignature = renderSignature;
        if (newIds.size > 0) {
          if (soundToggleEl.checked) {
            playAlertSound();
          }
        }
      } catch (error) {
        console.error(error);
      }
    }

    function getRefreshIntervalMs() {
      const seconds = Number.parseInt(refreshSecondsInputEl.value, 10);
      if (Number.isNaN(seconds)) {
        return 10000;
      }
      return Math.max(3, seconds) * 1000;
    }

    function syncSidebarForViewport() {
      const isMobile = window.matchMedia("(max-width: 900px)").matches;
      if (!isMobile) {
        sidebarEl.classList.remove("is-collapsed");
        sidebarToggleLabelEl.textContent = "항상 표시";
        return;
      }
      sidebarToggleLabelEl.textContent = sidebarEl.classList.contains("is-collapsed") ? "펼치기" : "접기";
    }

    function restartAutoRefresh() {
      if (refreshTimer) {
        clearInterval(refreshTimer);
      }
      refreshTimer = setInterval(() => {
        refreshIssues();
      }, getRefreshIntervalMs());
    }

    refreshSecondsInputEl.addEventListener("change", () => {
      const seconds = Math.max(3, Number.parseInt(refreshSecondsInputEl.value || "10", 10) || 10);
      refreshSecondsInputEl.value = String(seconds);
      restartAutoRefresh();
    });

    [filterGoogleNewsEl, filterTruthSocialEl, filterXEl, filterYoutubeEl].forEach((element) => {
      element.addEventListener("change", () => {
        renderIssues(latestIssues, new Set());
      });
    });

    sidebarToggleEl.addEventListener("click", () => {
      if (!window.matchMedia("(max-width: 900px)").matches) {
        return;
      }
      sidebarEl.classList.toggle("is-collapsed");
      syncSidebarForViewport();
    });

    window.addEventListener("resize", syncSidebarForViewport);
    refreshIssues();
    restartAutoRefresh();
    syncSidebarForViewport();
  </script>
</body>
</html>
